import org.gradle.api.tasks.bundling.AbstractArchiveTask
import org.springframework.boot.gradle.tasks.bundling.BootJar

buildscript {
  repositories {
    gradlePluginPortal()
    mavenCentral()
    // Google Maven mirror as fallback for CI/CD environments
    maven {
      url = uri("https://maven-central.storage-download.googleapis.com/maven2/")
    }
  }
}

plugins {
  id 'java'
  id 'org.springframework.boot' version '3.5.12'
  // Spotless for the code style
  id "com.diffplug.spotless" version "8.4.0"
  id "com.github.ben-manes.versions" version "0.53.0"
}

apply plugin: 'io.spring.dependency-management'

springBoot {
  mainClass = 'com.odde.doughnut.DoughnutApplication'
}

group = 'com.odde'
version = '0.0.1-SNAPSHOT'
java {
  sourceCompatibility = 25
  targetCompatibility = 25
}

tasks.withType(JavaCompile).configureEach {
  options.encoding = 'UTF-8'
}

tasks.withType(AbstractArchiveTask).configureEach {
  preserveFileTimestamps = false
}

// CLI install binary: on classpath for bootRun/E2E only — excluded from bootJar (phase 10).
tasks.register('copyCliBundle', Copy) {
  description = 'Copy bundled CLI into build/resources for local run; not packaged in bootJar.'
  def cliBundle = rootProject.file('cli/dist/doughnut-cli.bundle.mjs')
  doFirst {
    if (!cliBundle.isFile()) {
      throw new GradleException("Missing CLI bundle at ${cliBundle} — run: pnpm cli:bundle")
    }
  }
  from(cliBundle)
  rename { 'doughnut' }
  into(layout.buildDirectory.dir('resources/main/static/doughnut-cli-latest'))
}

tasks.named('copyCliBundle') {
  dependsOn('processResources')
}

tasks.named('resolveMainClassName') {
  dependsOn('copyCliBundle')
}

tasks.named('bootRun') {
  dependsOn('copyCliBundle')
}

tasks.named('jar') {
  dependsOn('copyCliBundle')
}

tasks.named('bootJar', BootJar) {
  dependsOn('copyCliBundle')
  exclude('static/**')
}

configurations {
  compileOnly {
    extendsFrom annotationProcessor
  }
}

repositories {
  gradlePluginPortal()
  mavenCentral()
  // Google Maven mirror as fallback for CI/CD environments
  maven {
    url = uri("https://maven-central.storage-download.googleapis.com/maven2/")
  }
}

ext['flyway.version'] = '11.20.3'

dependencies {
  implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
  implementation 'org.springframework.boot:spring-boot-starter-web'
  implementation 'org.springframework.boot:spring-boot-starter-websocket'
  implementation 'org.springframework.boot:spring-boot-starter-data-redis'
  implementation 'org.flywaydb:flyway-mysql'
  compileOnly 'org.flywaydb:flyway-core'
  implementation 'org.springframework.session:spring-session-core'
  implementation 'org.springframework.boot:spring-boot-starter-validation'
  implementation 'org.springframework.boot:spring-boot-starter-security'
  implementation 'org.springframework.boot:spring-boot-starter-oauth2-client'
  implementation 'org.springdoc:springdoc-openapi-starter-webmvc-api:2.8.15'
  implementation 'com.openai:openai-java:4.29.0'
  // RxJava2 for Flowable streaming support
  implementation 'io.reactivex.rxjava2:rxjava:2.2.21'
  compileOnly 'org.projectlombok:lombok:1.18.44'
  annotationProcessor 'org.projectlombok:lombok:1.18.44'
  developmentOnly 'org.springframework.boot:spring-boot-devtools'
  runtimeOnly 'com.mysql:mysql-connector-j:9.6.0'
  annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'
  testImplementation 'org.springframework.boot:spring-boot-starter-test'
  testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
  useJUnitPlatform()
  testLogging {
    exceptionFormat = 'full'
  }
}

tasks.register("bootRunE2E") {
  group = "application"
  description = "Runs Doughnut SpringBoot application in e2e profile"
  doFirst {
    tasks.bootRun.configure {
      systemProperty("spring.profiles.active", "e2e")
    }
  }
  finalizedBy("bootRun")
}

spotless {
  java {
    importOrder() // standard import order
    removeUnusedImports()
    googleJavaFormat()
    targetExclude("build/**")
  }
}

tasks.register("lint") {
  dependsOn spotlessCheck
}

def configureSpringBootTask = { task, description, taskName ->
  task.group = 'application'
  task.description = description
  task.classpath = sourceSets.main.runtimeClasspath
  task.mainClass = 'com.odde.doughnut.DoughnutApplication'
  task.systemProperty("spring.profiles.active", "test")
  task.args = ['--server.port=0'] // Using 0 will let Spring Boot pick a random available port
  task.systemProperty("odd-e.doughnut.task", taskName)
}

// Register and configure the migrateTestDB task
tasks.register("migrateTestDB", JavaExec) {
  configureSpringBootTask(delegate, "Runs DB migration for test profile", "migrateTestDB")
  ignoreExitValue = false  // Make the task fail if the Java process exits with non-zero
  classpath = sourceSets.main.runtimeClasspath.filter { file ->
    !file.name.contains('spring-boot-devtools')
  }
}

// Register and configure the generateOpenAPIDocs task
tasks.register('generateOpenAPIDocs', JavaExec) {
  configureSpringBootTask(delegate, 'Generate OpenAPI documentation', "generateOpenAPIDocs")
  // Exclude devtools to avoid non-zero exit due to restart hooks
  classpath = sourceSets.main.runtimeClasspath.filter { file ->
    !file.name.contains('spring-boot-devtools')
  }
  // Start with settings that avoid DB requirement while keeping beans available for scanning
  systemProperty("spring.main.lazy-initialization", "true")
  systemProperty("spring.flyway.enabled", "false")
  systemProperty("spring.jpa.properties.hibernate.dialect", "org.hibernate.dialect.MySQLDialect")
  systemProperty("spring.datasource.hikari.initialization-fail-timeout", "0")
}
