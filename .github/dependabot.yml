# @xmldom/xmldom and fast-xml-parser: pnpm overrides only. uuid: lockfile
# transitive only. Bumps for these are done with pnpm; Dependabot’s npm job
# often errors on them.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    ignore:
      - dependency-name: "@xmldom/xmldom"
      - dependency-name: "fast-xml-parser"
      - dependency-name: "uuid"
