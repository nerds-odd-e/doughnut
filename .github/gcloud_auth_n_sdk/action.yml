name: "Google Cloud Auth & SDK Setup"
description: "gcloud auth & gcloud-sdk setup"
inputs:
  credentials_json:
    description: "GCloud Credentials JSON"
    required: true
  skip_install:
    description: "Use gcloud on PATH instead of downloading SDK (GitHub Linux runners ship Google Cloud CLI). macOS runners need skip_install false. Self-hosted Linux without gcloud: set repo variable GCP_FORCE_GCLOUD_INSTALL=true (see ci.yml expression)."
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - name: GCP Auth with Service Account
      uses: google-github-actions/auth@v3
      with:
        credentials_json: ${{ inputs.credentials_json }}
    - name: Set up GCP SDK
      uses: google-github-actions/setup-gcloud@v3
      with:
        skip_install: ${{ inputs.skip_install == 'true' }}
