name: CLI Release

on:
  push:
    tags:
      - 'cli-*'

env:
  GCS_BUCKET: "dough-01"
  GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

jobs:
  build-and-publish:
    name: Build and publish CLI to GCS
    runs-on: ${{ vars.RUNNER }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/setup_nodejs_with_cache
        with:
          node_version: ${{ vars.NODE_VERSION }}
          pnpm_version: ${{ vars.PNPM_VERSION }}
      - name: Set CLI version from tag
        run: echo "CLI_VERSION=${GITHUB_REF#refs/tags/cli-v}" >> $GITHUB_ENV
      - name: Build CLI
        run: pnpm cli:bundle
      - uses: ./.github/gcloud_auth_n_sdk
        with:
          credentials_json: ${{ env.GCP_CREDENTIALS }}
      - name: Upload CLI binary to GCS
        run: gsutil cp cli/dist/doughnut-cli.bundle.mjs gs://${{ env.GCS_BUCKET }}/doughnut-cli-latest/doughnut
