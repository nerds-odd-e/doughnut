# Global URL map for the HTTPS target proxy (prod). Source for:
#   gcloud compute url-maps import doughnut-app-service-map \
#     --source=infra/gcp/url-maps/doughnut-app-service-map.yaml --global --quiet
#
# After CI uploads a new tree under gs://dough-01/frontend/<GITHUB_SHA>/, update
# every pathPrefixRewrite below to use that SHA, then import again.
name: doughnut-app-service-map
defaultService: https://www.googleapis.com/compute/v1/projects/carbon-syntax-298809/global/backendServices/doughnut-app-service
hostRules:
  - hosts:
      - '*'
    pathMatcher: doughnut-paths
pathMatchers:
  - name: doughnut-paths
    defaultService: https://www.googleapis.com/compute/v1/projects/carbon-syntax-298809/global/backendServices/doughnut-app-service
    pathRules:
      - paths:
          - /assets/*
        service: https://www.googleapis.com/compute/v1/projects/carbon-syntax-298809/global/backendBuckets/doughnut-frontend-backend-bucket
        routeAction:
          urlRewrite:
            pathPrefixRewrite: /frontend/9c3225c25eaab3d34ef5e0f1dd0a7487629352aa/assets/
      - paths:
          - /index.html
        service: https://www.googleapis.com/compute/v1/projects/carbon-syntax-298809/global/backendBuckets/doughnut-frontend-backend-bucket
        routeAction:
          urlRewrite:
            pathPrefixRewrite: /frontend/9c3225c25eaab3d34ef5e0f1dd0a7487629352aa/index.html
      - paths:
          - /
        service: https://www.googleapis.com/compute/v1/projects/carbon-syntax-298809/global/backendBuckets/doughnut-frontend-backend-bucket
        routeAction:
          urlRewrite:
            pathPrefixRewrite: /frontend/9c3225c25eaab3d34ef5e0f1dd0a7487629352aa/index.html
      - paths:
          - /odd-e.ico
        service: https://www.googleapis.com/compute/v1/projects/carbon-syntax-298809/global/backendBuckets/doughnut-frontend-backend-bucket
        routeAction:
          urlRewrite:
            pathPrefixRewrite: /frontend/9c3225c25eaab3d34ef5e0f1dd0a7487629352aa/odd-e.ico
      - paths:
          - /odd-e.png
        service: https://www.googleapis.com/compute/v1/projects/carbon-syntax-298809/global/backendBuckets/doughnut-frontend-backend-bucket
        routeAction:
          urlRewrite:
            pathPrefixRewrite: /frontend/9c3225c25eaab3d34ef5e0f1dd0a7487629352aa/odd-e.png
