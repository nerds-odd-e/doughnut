  /api/notebooks/{notebook}/folders:
    post:
      tags:
      - notebook-controller
      summary: Create a folder
      description: Creates a folder at notebook root when no parent is specified;
        as a child of underFolderId when set; otherwise nested under the context note's
        folder when underNoteId is set (underFolderId takes precedence when both are
        set).
      operationId: createFolder
      parameters:
      - name: notebook
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FolderCreationRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Folder"
  /api/notebooks/{notebook}/folders/{folder}/move:
    post:
      tags:
      - notebook-controller
      summary: Move a folder
      description: "Reparents the folder within the same notebook, or moves the folder\
        \ subtree to another notebook when destinationNotebookId is set. Notes keep\
        \ their folderId pointing at the same folder rows; descendant folders stay\
        \ under the moved subtree. A same-name folder at the destination returns 409\
        \ with FOLDER_NAME_CONFLICT unless merge=true, in which case the source subtree\
        \ is merged into the existing folder (including cross-notebook moves)."
      operationId: moveFolder
      parameters:
      - name: notebook
        in: path
        required: true
        schema:
          type: integer
      - name: folder
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FolderMoveRequest"
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Folder"
