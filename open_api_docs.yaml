              schema:
                $ref: "#/components/schemas/FolderRealm"
    delete:
      tags:
      - notebook-controller
      summary: Dissolve a folder
      description: "Removes the folder row. Direct notes and subfolders are promoted\
        \ to the dissolved folder's parent (or notebook root). Deeper descendants\
        \ stay under the promoted subfolder. When merge=true, clashing promoted subfolders\
        \ are merged into the existing same-name sibling instead of returning 409."
      operationId: dissolveFolder
      parameters:
      - name: notebook
        in: path
        required: true
        schema:
          type: integer
      - name: folder
        in: path
        required: true
        schema:
          type: integer
      - name: merge
        in: query
        required: false
        schema:
          type: boolean
          default: false
      responses:
        "200":
          description: OK
    patch:
      tags:
      - notebook-controller
      summary: Rename a folder
      description: Changes the folder display name under its current parent. Sibling
        name conflicts are rejected.
      operationId: renameFolder
      parameters:
      - name: notebook
        in: path
        required: true
        schema:
          type: integer
      - name: folder
        in: path
        required: true
