  /api/notebooks/{notebook}/book/blocks/{bookBlock}/reading-record:
    put:
      tags:
      - notebook-books-controller
      summary: Set reading disposition for a book block
      operationId: putNotebookBookBlockReadingRecord
      parameters:
      - name: notebook
        in: path
        required: true
        schema:
          type: integer
      - name: bookBlock
        in: path
        required: true
