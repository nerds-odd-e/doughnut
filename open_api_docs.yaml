components:
  schemas:
    BookBlockReadingRecordPutRequest:
      type: object
      properties:
        status:
          type: string
          description: Reading disposition for the book block's direct content
          enum:
          - READ
          - SKIMMED
          - SKIPPED
      required:
      - status
    BookBlockReadingRecordListItem:
      type: object
      properties:
        bookBlockId:
          type: string
        status:
          type: string
        completedAt:
          type: string
          format: date-time
      required:
      - bookBlockId
      - completedAt
      - status
    BookBlockDepthRequest_Full:
      type: object
      properties:
        direction:
          type: string
          enum:
          - INDENT
          - OUTDENT
          pattern: INDENT|OUTDENT
      required:
      - direction
    BookBlockMutationResponse_Full:
      type: object
      properties:
        id:
          type: integer
          format: int32
        depth:
          type: integer
          format: int32
          description: Nesting depth in the book layout; root-level blocks are 0.
        title:
          type: string
        contentLocators:
          type: array
          description: Locators for this block; present only when geometry changed
            (e.g. cancel merge).
          items:
            oneOf:
            - $ref: "#/components/schemas/EpubLocator_Full"
            - $ref: "#/components/schemas/PdfLocator_Full"
      required:
      - depth
      - id
      - title
    BookMutationResponse_Full:
      type: object
      properties:
        id:
          type: integer
          format: int32
        bookName:
          type: string
        format:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        blocks:
          type: array
          description: "Book blocks in depth-first preorder (parent before descendants,\
            \ then siblings). Order matches ascending layout_sequence in persistence."
          items:
            $ref: "#/components/schemas/BookBlockMutationResponse_Full"
        notebookId:
          type: string
      required:
      - blocks
      - bookName
      - format
      - id
      - notebookId
    ContentLocator_Full:
      discriminator:
        propertyName: type
        mapping:
          PdfLocator_Full: "#/components/schemas/PdfLocator_Full"
          EpubLocator_Full: "#/components/schemas/EpubLocator_Full"
      properties:
        type:
          type: string
      required:
      - type
    EpubLocator_Full:
      allOf:
      - $ref: "#/components/schemas/ContentLocator_Full"
      - type: object
        properties:
          href:
            type: string
          fragment:
            type: string
      required:
      - href
    PdfLocator_Full:
      allOf:
      - $ref: "#/components/schemas/ContentLocator_Full"
      - type: object
        properties:
          pageIndex:
            type: integer
            format: int32
          bbox:
            type: array
            items:
              type: number
              format: double
          contentBlockId:
            type: integer
            format: int32
          derivedTitle:
            type: string
      required:
      - bbox
      - pageIndex
    Circle:
      type: object
      properties:
        id:
          type: integer
          format: int32
        name:
          type: string
          maxLength: 255
          minLength: 1
      required:
      - id
      - name
    Ownership:
      type: object
      properties:
        id:
          type: integer
          format: int32
        circle:
          $ref: "#/components/schemas/Circle"
        ownerName:
          type: string
    User:
      type: object
      properties:
        id:
          type: integer
          format: int32
        name:
          type: string
        externalIdentifier:
          type: string
        ownership:
          $ref: "#/components/schemas/Ownership"
        dailyAssimilationCount:
          type: integer
          format: int32
        spaceIntervals:
          type: string
        admin:
          type: boolean
      required:
      - externalIdentifier
      - id
      - name
    TokenConfigDTO:
      type: object
      properties:
        label:
          type: string
          maxLength: 100
          minLength: 0
      required:
      - label
    GeneratedTokenDTO:
      type: object
      properties:
        id:
          type: integer
          format: int32
        token:
          type: string
        label:
          type: string
      required:
      - id
      - label
      - token
    TimeTravelRelativeToNow:
      type: object
      properties:
        hours:
          type: integer
          format: int32
    TimeTravel:
      type: object
      properties:
        travel_to:
          type: string
    ShareToBazaarRequest:
      type: object
      properties:
        notebookName:
          type: string
      required:
      - notebookName
    Randomization:
      type: object
      properties:
        choose:
          type: string
          enum:
          - first
          - last
          - seed
        seed:
          type: integer
          format: int32
    NoteTestData:
      type: object
      properties:
        Title:
          type: string
        Content:
          type: string
        Skip Memory Tracking:
          type: boolean
        Remember Spelling:
          type: boolean
        Image Url:
          type: string
        Image Mask:
          type: string
        Folder:
          type: string
          description: "Notebook-local folder path (segments separated by /). E2E/testability\
            \ only: missing folder rows are created here, then the note is assigned\
            \ that folder. Production note APIs do not accept or infer folder paths."
    NotesTestData:
      type: object
      properties:
        noteTestData:
          type: array
          items:
            $ref: "#/components/schemas/NoteTestData"
        externalIdentifier:
          type: string
          writeOnly: true
        circleName:
          type: string
          writeOnly: true
        notebookName:
          type: string
      required:
      - notebookName
    PredefinedQuestionTestData:
      type: object
      properties:
        Note Title:
          type: string
        Question:
          type: string
        Answer:
          type: string
        One Wrong Choice:
          type: string
    PredefinedQuestionsTestData:
      type: object
      properties:
        notebookName:
          type: string
        predefinedQuestionTestData:
          type: array
          items:
            $ref: "#/components/schemas/PredefinedQuestionTestData"
    MultipleChoicesQuestion:
      type: object
      properties:
        questionStem:
          type: string
        responseChoices:
          type: array
          items:
            type: string
      required:
      - questionStem
      - responseChoices
    PredefinedQuestion:
      type: object
      properties:
        id:
          type: integer
          format: int32
        multipleChoicesQuestion:
          $ref: "#/components/schemas/MultipleChoicesQuestion"
        correctAnswerIndex:
          type: integer
          format: int32
        contextSeed:
          type: integer
          format: int64
        testedFocus:
          type: string
        validationRationale:
          type: string
      required:
      - id
      - multipleChoicesQuestion
    SubscriptionDTO:
      type: object
      properties:
        dailyTargetOfNewNotes:
          type: integer
          format: int32
    Notebook:
      type: object
      properties:
        id:
          type: integer
          format: int32
        notebookSettings:
