packages:
  - frontend
  - mcp-server
  - cli
  - packages/doughnut-api
  - packages/doughnut-test-fixtures
  - packages/generated/doughnut-backend-api

strictDepBuilds: true

allowBuilds:
  '@badeball/cypress-cucumber-preprocessor': true
  '@biomejs/biome': true
  '@parcel/watcher': true
  canvas: true
  core-js: true
  core-js-pure: true
  cypress: true
  ejs: true
  es5-ext: false
  esbuild: true
  github_action_sound: true
  protobufjs: true
  tesseract.js: true
