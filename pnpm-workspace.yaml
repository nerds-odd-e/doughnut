packages:
  - frontend
  - mcp-server
  - cli
  - packages/doughnut-api
  - packages/doughnut-test-fixtures
  - packages/generated/doughnut-backend-api

overrides:
  '@anev/ts-mountebank>superagent': '>=10.3.0'
  '@hono/node-server': '>=2.0.11'
  '@isaacs/brace-expansion': '>=5.0.5'
  '@tootallnate/once': '>=3.0.1'
  '@xmldom/xmldom': '>=0.9.10'
  ajv: '>=8.18.0'
  axios: '>=1.15.0'
  body-parser: '>=2.2.1'
  brace-expansion: '>=5.0.5'
  canvas: '>=3.2.3'
  defu: '>=6.1.5'
  diff: '>=8.0.3'
  dompurify: '>=3.4.0'
  ejs: '>=3.1.10'
  esbuild: '>=0.28.1'
  express: '>=5.2.0'
  express-rate-limit: '>=8.2.2'
  fast-uri: '>=3.1.1'
  fast-xml-builder: '>=1.1.7'
  fast-xml-parser: '>=5.7.0'
  flatted: '>=3.4.2'
  follow-redirects: '>=1.16.0'
  form-data: '>=4.0.6'
  formidable: '>=3.5.3'
  glob: '>=11.1.0'
  handlebars: '>=4.7.9'
  idna: '>=3.15'
  immutable: '>=5.1.5'
  ip-address: '>=10.1.1'
  js-yaml: '>=4.1.1'
  'jsonpath-plus@<10.0.0': '>=10.2.0'
  linkify-it: 5.0.2
  lodash: '>=4.18.0'
  lodash-es: '>=4.18.0'
  mailparser: '>=3.9.3'
  minimatch: '>=10.2.3'
  nodemailer: '>=9.0.1'
  path-to-regexp: '>=8.4.0'
  picomatch: '>=4.0.4'
  protobufjs: '>=7.5.5'
  qs: '>=6.14.2'
  rollup: '>=4.59.0'
  serialize-javascript: '>=7.0.5'
  systeminformation: '>=5.31.6'
  tmp: '>=0.2.6'
  undici: '>=8.5.0'
  uuid: '>=14.0.0'
  yaml: '>=2.9.0'
  yauzl: '>=3.2.1'

allowBuilds:
  '@badeball/cypress-cucumber-preprocessor': true
  '@biomejs/biome': true
  '@parcel/watcher': true
  canvas: true
  core-js: true
  core-js-pure: true
  cypress: true
  ejs: true
  es5-ext: false
  esbuild: true
  github_action_sound: true
  protobufjs: true
  tesseract.js: true

# Trust our committed lockfile; skip the supply-chain verification pass.
# minimumReleaseAgeExclude below only affects resolution (which version
# `pnpm up` picks), NOT this verification pass. Without trustLockfile,
# pulling a same-day release breaks every install until it ages out.
trustLockfile: true

# Resolution-only cooldown exemptions; add pkg@version to adopt a fresh release.
minimumReleaseAgeExclude:
  - '@biomejs/biome@2.5.4'
  - '@biomejs/cli-darwin-arm64@2.5.4'
  - '@biomejs/cli-darwin-x64@2.5.4'
  - '@biomejs/cli-linux-arm64-musl@2.5.4'
  - '@biomejs/cli-linux-arm64@2.5.4'
  - '@biomejs/cli-linux-x64-musl@2.5.4'
  - '@biomejs/cli-linux-x64@2.5.4'
  - '@biomejs/cli-win32-arm64@2.5.4'
  - '@biomejs/cli-win32-x64@2.5.4'
  - '@lucide/vue@1.25.0'
  - '@redocly/cli@2.40.0'
  - '@redocly/openapi-core@2.40.0'
  - '@redocly/respect-core@2.40.0'
  - '@vue/compiler-core@3.5.40'
  - '@vue/compiler-dom@3.5.40'
  - '@vue/compiler-sfc@3.5.40'
  - '@vue/compiler-ssr@3.5.40'
  - '@vue/reactivity@3.5.40'
  - '@vue/runtime-core@3.5.40'
  - '@vue/runtime-dom@3.5.40'
  - '@vue/server-renderer@3.5.40'
  - '@vue/shared@3.5.40'
  - '@vue/test-utils@2.4.11'
  - daisyui@5.7.0
  - tmp@0.2.6
  - vue-router@5.2.0
  - vue@3.5.40
